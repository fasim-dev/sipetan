<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2e7d32">
    <meta name="description" content="Aplikasi Input Laporan Kegiatan Penyuluhan Pertanian">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SiPetan">
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- Icons untuk berbagai platform -->
    <link rel="icon" type="image/png" sizes="72x72" href="icons/icon-72.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/icon-96.png">
    <link rel="icon" type="image/png" sizes="128x128" href="icons/icon-128.png">
    <link rel="icon" type="image/png" sizes="144x144" href="icons/icon-144.png">
    <link rel="icon" type="image/png" sizes="152x152" href="icons/icon-152.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="384x384" href="icons/icon-384.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
    
    <title>SiPetan - Laporan Kegiatan Penyuluhan Pertanian</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div id="app">
        <div class="loading">
            <i class="fas fa-spinner fa-spin"></i> Memuat aplikasi...
        </div>
    </div>
    
    <!-- Install Prompt untuk PWA -->
    <div id="installPrompt" style="display: none; position: fixed; bottom: 80px; left: 16px; right: 16px; background: var(--primary); color: white; padding: 16px; border-radius: 16px; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fas fa-download" style="font-size: 24px;"></i>
            <div style="flex: 1;">
                <strong>Install SiPetan</strong>
                <p style="font-size: 0.75rem; margin-top: 4px;">Install aplikasi ini di HP Anda untuk akses lebih cepat</p>
            </div>
            <button id="installBtn" style="background: white; color: var(--primary); border: none; padding: 8px 16px; border-radius: 24px; font-weight: bold; cursor: pointer;">Install</button>
            <button id="closeInstallBtn" style="background: transparent; color: white; border: none; font-size: 20px; cursor: pointer;">&times;</button>
        </div>
    </div>
    
    <script src="app.js"></script>
    <script>
        // PWA Installation
        let deferredPrompt;
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installPrompt = document.getElementById('installPrompt');
            if (installPrompt) {
                installPrompt.style.display = 'block';
            }
        });
        
        document.getElementById('installBtn')?.addEventListener('click', async () => {
            const installPrompt = document.getElementById('installPrompt');
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response to the install prompt: ${outcome}`);
                deferredPrompt = null;
                if (installPrompt) {
                    installPrompt.style.display = 'none';
                }
            }
            if (installPrompt) {
                installPrompt.style.display = 'none';
            }
        });
        
        document.getElementById('closeInstallBtn')?.addEventListener('click', () => {
            const installPrompt = document.getElementById('installPrompt');
            if (installPrompt) {
                installPrompt.style.display = 'none';
            }
        });
        
        // Service Worker registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered:', reg))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
